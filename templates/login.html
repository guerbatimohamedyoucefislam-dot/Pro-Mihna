{% extends "layout.html" %}
{% block content %}
<div class="glass" style="max-width: 500px; margin: 2rem auto; padding: 2rem;">
    <h2 style="text-align: center;">{{ t('login_title') }}</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group"><label>{{ t('email') }}:</label><input type="email" name="email" placeholder="{{ t('email_placeholder') }}" required></div>
        <div class="form-group"><label>{{ t('password') }}:</label><input type="password" name="password" placeholder="{{ t('password_placeholder') }}" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">{{ t('login') }}</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">{{ t('no_account') }} <a href="{{ url_for('register') }}">{{ t('register') }}</a></p>
</div>
{% endblock %}
