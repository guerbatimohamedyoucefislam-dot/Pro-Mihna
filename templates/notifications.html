{% extends "layout.html" %}
{% block content %}
<div class="card glass" style="max-width: 700px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="margin: 0;">{{ t('notifications') }}</h2>
        <form action="{{ url_for('mark_all_read') }}" method="POST">
            <button type="submit" class="btn btn-outline btn-sm">{{ t('mark_all_read') }}</button>
        </form>
    </div>

    <div class="notif-list">
        {% for n in notifs %}
        <a href="{{ n.link or '#' }}" style="text-decoration: none; color: inherit;">
            <div class="notif-item {{ 'unread' if not n.is_read else 'read' }}">
                <div class="notif-dot"></div>
                <div style="flex: 1;">
                    <strong>{{ n.title }}</strong>
                    <p style="margin: 0.25rem 0 0; color: var(--text-muted);">{{ n.message }}</p>
                </div>
                <div class="notif-time">{{ n.created_at[5:16] }}</div>
            </div>
        </a>
        {% else %}
        <div style="text-align: center; padding: 2rem; color: var(--text-muted);">{{ t('no_notifications') }}</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
